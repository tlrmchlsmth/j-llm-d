release: wide-ep
cluster: gb200
topology: decode_bench

model:
  id: deepseek-ai/DeepSeek-V4-Pro
  label: DeepSeek-V4-Pro
  image: quay.io/tms/vllm-deepseekv4-custom-deepep:latest

routing: {kind: load_aware, target_role: decode}
runtime: {sidecars: [dcgm-exporter, node-exporter]}
vars: {max_concurrency: 1024, mtp_size: 1}

roles:
  - name: decode
    lws: {size: 4}
    parallelism: {gpus_per_node: 4, tp: 1, dp: 16, ep: true}
    dp_load_balancing: external
    routing_proxy: true
    kv_transfer_config:
      kv_connector: DecodeBenchConnector
      kv_role: kv_both
      kv_connector_extra_config: {fill_mean: 0.015, fill_std: 0.0}
    computed:
      env: {MAX_TOKENS: max_concurrency}
      vllm:
        max_num_batched_tokens: max_concurrency * mtp_size
        max_num_seqs: max_concurrency
        max_cudagraph_capture_size: max_concurrency
    env:
      VLLM_MOE_ROUTING_SIMULATION_STRATEGY: uniform_random
    vllm:
      load_format: auto
      disable_uvicorn_access_log: true
      trust_remote_code: true
      gpu_memory_utilization: "0.85"
      api_server_count: 4
      kv_cache_dtype: fp8
      block_size: 256
      enable_force_include_usage: true
      all2all_backend: deepep_v2
