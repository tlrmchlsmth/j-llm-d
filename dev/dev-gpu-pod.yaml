apiVersion: v1
kind: Pod
metadata:
  name: ${DEPLOY_USER}-dev-gpu
  labels:
    app: ${DEPLOY_USER}-dev-gpu
    llm-d.ai/owner: ${DEPLOY_USER}
spec:
  restartPolicy: Never
  terminationGracePeriodSeconds: 0
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 2Gi
    - name: lustre
      persistentVolumeClaim:
        claimName: lustre-pvc-vllm
    - name: local-nvme
      hostPath:
        path: /mnt/numa0
        type: Directory
  containers:
    - name: vllm
      image: ${DECODE_IMAGE}
      command: ["bash"]
      stdin: true
      tty: true
      securityContext:
        runAsUser: 0
        capabilities:
          add: [IPC_LOCK, SYS_RAWIO]
      env:
        - name: VLLM_DEV_VENV
          value: ${VLLM_DEV_VENV}
        - name: HF_HOME
          value: /mnt/local/hf_cache
        - name: VLLM_CACHE_ROOT
          value: /mnt/lustre/${DEPLOY_USER}/vllm_cache_extdp
        - name: FLASHINFER_CACHE_DIR
          value: /mnt/lustre/${DEPLOY_USER}/flashinfer_cache_extdp
        - name: TRITON_LIBCUDA_PATH
          value: /usr/lib64
        - name: VLLM_USE_V2_MODEL_RUNNER
          value: "1"
        - name: VLLM_USE_DEEP_GEMM
          value: "1"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
              optional: true
      resources:
        limits:
          nvidia.com/gpu: "1"
          memory: 128Gi
        requests:
          nvidia.com/gpu: "1"
          cpu: 8
          memory: 128Gi
      volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /mnt/lustre
          name: lustre
        - mountPath: /mnt/local
          name: local-nvme
