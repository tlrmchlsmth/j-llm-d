apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-gb200-decode-bench
  labels:
    llm-d.ai/inferenceServing: "true"
    llm-d.ai/model: DeepSeek-R1-NVFP4
    llm-d.ai/role: decode
    llm-d.ai/deployment: decode-bench
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 4
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/inferenceServing: "true"
          llm-d.ai/model: DeepSeek-R1-NVFP4
          llm-d.ai/role: decode
          llm-d.ai/deployment: decode-bench
      spec:
        serviceAccountName: wide-ep-gb200
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: lustre
            persistentVolumeClaim:
              claimName: lustre-pvc-vllm
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: llm-d-dev-claim
        initContainers:
          - name: routing-proxy-rank0
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            args:
              - --port=8000
              - --vllm-port=8200
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8000
                name: proxy-rank0
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank1
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            args:
              - --port=8001
              - --vllm-port=8201
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8001
                name: proxy-rank1
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank2
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            args:
              - --port=8002
              - --vllm-port=8202
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8002
                name: proxy-rank2
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank3
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            args:
              - --port=8003
              - --vllm-port=8203
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8003
                name: proxy-rank3
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
        containers:
          - name: vllm
            image: quay.io/tms/llm-d-cuda-dev:0e22cd6-07e22e2-00a944e
            #image: quay.io/tms/llm-d-cuda-dev:gb200_working-89fbb12fe <-- It's broken
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                #################
                # RUN vLLM decode-bench with external DP load balancing
                # Launches 4 independent vLLM processes (one per GPU)
                # Routing sidecar maps port 800X → localhost:820X
                #################
                # DEV mode: use persistent Lustre venv; otherwise use baked-in image venv
                if [ -n "${VLLM_DEV_VENV}" ] && [ -d "${VLLM_DEV_VENV}" ]; then
                  echo "Using dev venv at ${VLLM_DEV_VENV}"
                  source "${VLLM_DEV_VENV}/bin/activate"
                else
                  source /opt/vllm/bin/activate
                fi

                uv pip uninstall pplx-kernels

                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                for R in $(seq 0 $((DP_SIZE_LOCAL - 1))); do
                  VLLM_CACHE_ROOT=${VLLM_CACHE_ROOT}/rank$R \
                  FLASHINFER_CACHE_DIR=${FLASHINFER_CACHE_DIR}/rank$R \
                  CUDA_VISIBLE_DEVICES=$R vllm serve \
                    nvidia/DeepSeek-R1-NVFP4 \
                    --port $((8200 + R)) \
                    --disable-uvicorn-access-log \
                    --enable-expert-parallel \
                    --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                    --data-parallel-rank $((START_RANK + R)) \
                    --data-parallel-size-local 1 \
                    --data-parallel-address ${LWS_LEADER_ADDRESS} \
                    --data-parallel-rpc-port 5555 \
                    --trust-remote-code \
                    --kv_transfer_config '{"kv_connector":"DecodeBenchConnector",
                                           "kv_role":"kv_both",
                                           "kv_connector_extra_config": {
                                             "fill_mean": 0.015,
                                             "fill_std": 0.0
                                           }}' \
                    --async-scheduling \
                    --kv-cache-dtype fp8 \
                    --all2all-backend "deepep_low_latency" \
                    --gpu-memory-utilization 0.85 \
                    --max-num-batched-tokens $VLLM_MOE_DP_CHUNK_SIZE \
                    --profiler-config '{"profiler": "torch",
                                        "torch_profiler_dir": "/traces",
                                        "ignore_frontend": "true",
                                        "delay_iterations": 5,
                                        "max_iterations": 3}' \
                    --compilation_config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
                    --enable-force-include-usage &
                done

                #    --enable-eplb \
                #    --eplb-config '{"window_size":"100",
                #                    "step_interval":"1000",
                #                    "num_redundant_experts":"32",
                #                    "log_balancedness":"True",
                #                    "log_balancedness_interval":"100"}' \ 

                # If any process exits, kill all and restart pod
                wait -n
                kill $(jobs -p) 2>/dev/null
                exit 1

            env:
              # Set to a Lustre venv path to override baked-in vLLM (e.g. /mnt/lustre/tms/vllm-venv)
              - name: VLLM_DEV_VENV
                value: ""

              # Use NVFP4 dispatch, and then masked_gemm is required to avoid crashes
              - name: VLLM_DEEPEPLL_NVFP4_DISPATCH
                value: "1"
              - name: VLLM_FLASHINFER_MOE_BACKEND
                value: "masked_gemm"

              # Needed for reasonable balancedness when using the DecodeBenchConnector
              - name: VLLM_MOE_ROUTING_SIMULATION_STRATEGY
                value: "uniform_random"
   
              # NVSHEMEM_QP_DEPTH should be >= 2 * VLLM_MOE_DP_CHUNK_SIZE
              - name: NVSHMEM_QP_DEPTH
                value: "2048"
              - name: VLLM_MOE_DP_CHUNK_SIZE
                value: "768"

              # HuggingFace token and cache location
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/lustre/hf_cache

              # Compile caches - persist across restarts for faster startup
              - name: VLLM_CACHE_ROOT
                value: /mnt/lustre/tms/vllm_cache_extdp
              - name: FLASHINFER_CACHE_DIR
                value: /mnt/lustre/tms/flashinfer_cache_extdp

              # Data parallelism - GPUs per pod
              - name: DP_SIZE_LOCAL
                value: "4"

              - name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
                value: "1"

              # Common vLLM settings
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled

              # Use fabric handles for NVSHMEM symmetric heap (MNNVL)
              # Without this, NVSHMEM defaults to FILE_DESCRIPTOR (IPC handles)
              # and falls back to ibrc transport instead of NVLink fabric
              - name: NVSHMEM_CUMEM_HANDLE_TYPE
                value: FABRIC

              # Override container default that disables VMM
              # VMM is required for fabric memory / MNNVL cross-pod communication
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"

              # Engine startup timeout (default 600s, increase for large models over network storage)
              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"

              # Debug logging
              - name: VLLM_LOGGING_LEVEL
                value: INFO
              - name: NCCL_DEBUG
                value: "TRACE"
              - name: NVSHMEM_DEBUG
                value: INFO
            ports:
              - containerPort: 8200
                name: vllm-rank0
                protocol: TCP
              - containerPort: 8201
                name: vllm-rank1
                protocol: TCP
              - containerPort: 8202
                name: vllm-rank2
                protocol: TCP
              - containerPort: 8203
                name: vllm-rank3
                protocol: TCP
            readinessProbe:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 60
              periodSeconds: 10
            resources:
              claims:
                - name: compute-domain-channel
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/lustre
                name: lustre
            workingDir: /code
