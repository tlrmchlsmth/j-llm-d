# Gateway for GB200 decode-bench deployment
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: wide-ep-gb200-inference-gateway
  labels:
    istio.io/enable-inference-extproc: "true"
spec:
  gatewayClassName: istio
  listeners:
  - name: default
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
# Service for the gateway (Istio doesn't always auto-create this)
apiVersion: v1
kind: Service
metadata:
  name: wide-ep-gb200-inference-gateway-istio
  labels:
    gateway.networking.k8s.io/gateway-name: wide-ep-gb200-inference-gateway
    istio.io/enable-inference-extproc: "true"
spec:
  selector:
    gateway.networking.k8s.io/gateway-name: wide-ep-gb200-inference-gateway
  ports:
  - name: status-port
    port: 15021
    protocol: TCP
    targetPort: 15021
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
