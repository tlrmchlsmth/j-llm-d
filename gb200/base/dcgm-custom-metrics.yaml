apiVersion: v1
kind: ConfigMap
metadata:
  name: wide-ep-dcgm-metrics
data:
  custom-counters.csv: |
    # NVLink / MNNVL bandwidth
    DCGM_FI_PROF_NVLINK_TX_BYTES,  gauge, NVLink transmit bytes per second
    DCGM_FI_PROF_NVLINK_RX_BYTES,  gauge, NVLink receive bytes per second

    # GPU utilization
    DCGM_FI_DEV_GPU_UTIL,          gauge, GPU utilization (percent)
    DCGM_FI_DEV_MEM_COPY_UTIL,     gauge, Memory copy engine utilization (percent)
    DCGM_FI_PROF_SM_ACTIVE,        gauge, Ratio of cycles with at least one active warp
    DCGM_FI_PROF_SM_OCCUPANCY,     gauge, Ratio of active warps to max warps
    DCGM_FI_PROF_DRAM_ACTIVE,      gauge, Ratio of cycles with active DRAM reads or writes

    # Thermal and power
    DCGM_FI_DEV_GPU_TEMP,          gauge, GPU temperature (C)
    DCGM_FI_DEV_POWER_USAGE,       gauge, GPU power draw (W)

    # Framebuffer memory
    DCGM_FI_DEV_FB_USED,           gauge, Framebuffer memory used (MiB)
    DCGM_FI_DEV_FB_FREE,           gauge, Framebuffer memory free (MiB)

    # NVLink error counters (correlate with collective tail latency)
    DCGM_FI_DEV_NVLINK_REPLAY_ERROR_COUNT_TOTAL,   counter, NVLink replay errors total
    DCGM_FI_DEV_NVLINK_RECOVERY_ERROR_COUNT_TOTAL,  counter, NVLink recovery errors total
    DCGM_FI_DEV_NVLINK_CRC_FLIT_ERROR_COUNT_TOTAL,  counter, NVLink CRC flit errors total
    DCGM_FI_DEV_NVLINK_CRC_DATA_ERROR_COUNT_TOTAL,  counter, NVLink CRC data errors total

    # Per-link NVLink bandwidth (L0-L17, GB200 NVLink5 up to 18 links per GPU)
    # Requires DCGM 3.1+; validate with: dcgmi dmon -e 700,701,702 -d 1000
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L0,  gauge, NVLink bandwidth link 0
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L1,  gauge, NVLink bandwidth link 1
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L2,  gauge, NVLink bandwidth link 2
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L3,  gauge, NVLink bandwidth link 3
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L4,  gauge, NVLink bandwidth link 4
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L5,  gauge, NVLink bandwidth link 5
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L6,  gauge, NVLink bandwidth link 6
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L7,  gauge, NVLink bandwidth link 7
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L8,  gauge, NVLink bandwidth link 8
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L9,  gauge, NVLink bandwidth link 9
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L10, gauge, NVLink bandwidth link 10
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L11, gauge, NVLink bandwidth link 11
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L12, gauge, NVLink bandwidth link 12
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L13, gauge, NVLink bandwidth link 13
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L14, gauge, NVLink bandwidth link 14
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L15, gauge, NVLink bandwidth link 15
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L16, gauge, NVLink bandwidth link 16
    DCGM_FI_DEV_NVLINK_BANDWIDTH_L17, gauge, NVLink bandwidth link 17
