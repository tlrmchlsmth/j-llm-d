apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-decode
  labels:
    llm-d.ai/inferenceServing: "true"
    llm-d.ai/model: MODEL_LABEL_PLACEHOLDER
    llm-d.ai/role: decode
spec:
  replicas: 1
  rolloutStrategy:
    type: RollingUpdate
    rollingUpdateConfiguration:
      maxUnavailable: 100%
  leaderWorkerTemplate:
    size: DECODE_LWS_SIZE_PLACEHOLDER
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/deploy-ts: DEPLOY_TS_PLACEHOLDER
          llm-d.ai/inferenceServing: "true"
          llm-d.ai/model: MODEL_LABEL_PLACEHOLDER
          llm-d.ai/owner: OWNER_PLACEHOLDER
          llm-d.ai/role: decode
      spec:
        serviceAccountName: wide-ep
        terminationGracePeriodSeconds: 0
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: lustre
            persistentVolumeClaim:
              claimName: lustre-pvc-vllm
          - name: local-nvme
            hostPath:
              path: /mnt/numa0
              type: Directory
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: llm-d-dev-claim
        initContainers:
          # Sidecar image from https://github.com/llm-d/llm-d-inference-scheduler/pull/746
          # (hot-path perf optimizations: connection pooling, LRU cache, alloc reduction)
          - name: routing-proxy-rank0
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8000
              - --vllm-port=8200
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8000
                name: proxy-rank0
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank1
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8001
              - --vllm-port=8201
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8001
                name: proxy-rank1
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank2
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8002
              - --vllm-port=8202
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8002
                name: proxy-rank2
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank3
            image: ghcr.io/tlrmchlsmth/llm-d-routing-sidecar:perf
            imagePullPolicy: Always
            args:
              - --port=8003
              - --vllm-port=8203
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8003
                name: proxy-rank3
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
        containers:
          - name: vllm
            image: VLLM_IMAGE_PLACEHOLDER
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                set -euxo pipefail
                # Persist logs to Lustre so they survive LWS pod recreation
                LOG_DIR=LUSTRE_PREFIX_PLACEHOLDER/logs/decode
                mkdir -p "$LOG_DIR"
                LOG_FILE="$LOG_DIR/${HOSTNAME}_$(date +%Y%m%d-%H%M%S).log"
                exec > >(tee -a "$LOG_FILE") 2>&1
                echo "=== Pod $HOSTNAME started at $(date -Iseconds) ==="

                FORK_REPO="FORK_REPO_PLACEHOLDER"
                FORK_BRANCH="FORK_BRANCH_PLACEHOLDER"
                if [ -n "$FORK_BRANCH" ]; then
                  cd /opt/vllm-source
                  git remote add fork "$FORK_REPO" 2>/dev/null || git remote set-url fork "$FORK_REPO"
                  git fetch fork "$FORK_BRANCH"
                  git checkout "fork/$FORK_BRANCH"
                  echo "=== Checked out fork/$FORK_BRANCH at $(date) ==="
                  cd -
                fi

                # DEV mode: use persistent Lustre venv; otherwise use baked-in image venv
                if [ -n "${VLLM_DEV_VENV}" ] && [ -d "${VLLM_DEV_VENV}" ]; then
                  echo "Using dev venv at ${VLLM_DEV_VENV}"
                  source "${VLLM_DEV_VENV}/bin/activate"
                else
                  source /opt/vllm/bin/activate
                fi

                uv pip install --upgrade mistral_common

                DEEPEP_WHEEL_DIR="LUSTRE_PREFIX_PLACEHOLDER/wheels"
                if [ "BUILD_DEEPEP_WHEEL_PLACEHOLDER" = "true" ]; then
                  if [ "${LWS_WORKER_INDEX:-0}" = "0" ]; then
                    echo "=== Building DeepEP wheel on decode leader ==="
                    SRCDIR="LUSTRE_PREFIX_PLACEHOLDER/deepep-src"
                    if [ ! -d "$SRCDIR/.git" ]; then
                      git clone --branch DEEPEP_BRANCH_PLACEHOLDER DEEPEP_REPO_PLACEHOLDER "$SRCDIR"
                    else
                      cd "$SRCDIR"
                      git fetch origin DEEPEP_BRANCH_PLACEHOLDER
                      git checkout DEEPEP_BRANCH_PLACEHOLDER
                      git reset --hard origin/DEEPEP_BRANCH_PLACEHOLDER
                      cd /
                    fi
                    cd "$SRCDIR"
                    echo "Building from $(git log -1 --oneline)..."
                    uv pip wheel --no-deps --no-build-isolation -w /tmp/deepep-wheels .
                    mkdir -p "$DEEPEP_WHEEL_DIR"
                    rm -f "$DEEPEP_WHEEL_DIR"/deep_ep-*.whl
                    cp /tmp/deepep-wheels/deep_ep-*.whl "$DEEPEP_WHEEL_DIR"/
                    rm -rf /tmp/deepep-wheels
                    echo "=== DeepEP wheel built ==="
                    ls -lh "$DEEPEP_WHEEL_DIR"/deep_ep-*.whl
                    cd /
                  else
                    echo "=== Waiting for DeepEP wheel on Lustre ==="
                    while ! ls "$DEEPEP_WHEEL_DIR"/deep_ep-*.whl &>/dev/null; do
                      sleep 5
                    done
                    echo "=== DeepEP wheel found ==="
                  fi
                fi

                DEEPEP_WHL=$(ls "$DEEPEP_WHEEL_DIR"/deep_ep-*.whl 2>/dev/null | sort -V | tail -1 || true)
                if [ -n "$DEEPEP_WHL" ]; then
                  echo "Installing custom DeepEP wheel: $DEEPEP_WHL"
                  uv pip install --force-reinstall --no-deps "$DEEPEP_WHL"
                fi

                # Derive batch-size-dependent env vars from MAX_TOKENS
                export VLLM_MOE_DP_CHUNK_SIZE=$MAX_TOKENS
                # NVSHMEM_QP_DEPTH only needed for DeepEP
                export NVSHMEM_QP_DEPTH=$((MAX_TOKENS * 2))

                DP_SIZE_LOCAL=$((4 / TP_SIZE))
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                PROFILER_ARGS=""
                NSYS_PREFIX=""
                NVTX_TRACING_ARG=""
                if [ "${ENABLE_PROFILING:-0}" = "1" ]; then
                  echo "Profiling enabled, installing profiling tools..."
                  uv pip install nvtx
                  mkdir -p /trace
                  apt-get update && apt-get install -y --no-install-recommends nsight-systems-cli 2>/dev/null || \
                  uv pip install nvidia-nsight-systems 2>/dev/null || \
                  (echo "ERROR: Could not install nsys. Add nsight-systems to your container image." && exit 1)

                  if [ "${PROFILER_TYPE:-nsys}" = "nsys" ]; then
                    NSYS_PREFIX="nsys profile --cuda-graph-trace=graph --trace=cuda,nvtx --delay=${PROFILER_DELAY_SECS:-120} --duration=${PROFILER_DURATION_SECS:-10} -o /trace/decode_rank_${START_RANK}"
                    NVTX_TRACING_ARG="--enable-layerwise-nvtx-tracing"
                  else
                    PROFILER_ARGS="--profiler-config {\"profiler\":\"torch\",\"max_iterations\":${PROFILER_MAX_ITERS:-32},\"torch_profiler_dir\":\"/trace\"}"
                  fi
                fi

                # EPLB config: build flags from env vars
                EPLB_ARGS=""
                if [ "${EPLB_ENABLED:-true}" = "true" ]; then
                  EPLB_LOG_INTERVAL=${EPLB_LOG_BALANCEDNESS_INTERVAL:-$(( ${EPLB_STEP_INTERVAL:-3000} / 3 ))}
                  EPLB_ASYNC_BOOL=$( [ "${EPLB_USE_ASYNC:-false}" = "true" ] && echo true || echo false )
                  EPLB_LOG_BOOL=$( [ "${EPLB_LOG_BALANCEDNESS:-false}" = "true" ] && echo true || echo false )
                  EPLB_DUMP_DIR="${EPLB_EXPERT_LOAD_DUMP_DIR:-}"
                  DUMP_DIR_JSON=""
                  if [ -n "$EPLB_DUMP_DIR" ]; then
                    EPLB_DUMP_DIR="${EPLB_DUMP_DIR}/decode"
                    mkdir -p "$EPLB_DUMP_DIR"
                    DUMP_DIR_JSON=",\"expert_load_dump_dir\":\"${EPLB_DUMP_DIR}\""
                  fi
                  EPLB_JSON="{\"window_size\":${EPLB_WINDOW_SIZE:-100},\"step_interval\":${EPLB_STEP_INTERVAL:-3000},\"num_redundant_experts\":${EPLB_NUM_REDUNDANT_EXPERTS:-32},\"communicator\":\"${EPLB_COMMUNICATOR}\",\"use_async\":${EPLB_ASYNC_BOOL},\"log_balancedness\":${EPLB_LOG_BOOL},\"log_balancedness_interval\":${EPLB_LOG_INTERVAL}${DUMP_DIR_JSON}}"
                  EPLB_ARGS="--enable-eplb --eplb-config"
                fi

                PREFIX_CACHE_ARG="--enable-prefix-caching"
                if [ "${PREFIX_CACHING:-true}" = "false" ]; then
                  PREFIX_CACHE_ARG="--no-prefix-caching"
                fi

                for R in $(seq 0 $((DP_SIZE_LOCAL - 1))); do
                  GPU_START=$((R * TP_SIZE))
                  GPUS=$(seq -s, $GPU_START $((GPU_START + TP_SIZE - 1)))

                  VLLM_CACHE_ROOT=${VLLM_CACHE_ROOT}/rank$R \
                  FLASHINFER_CACHE_DIR=${FLASHINFER_CACHE_DIR}/rank$R \
                  CUDA_VISIBLE_DEVICES=$GPUS $NSYS_PREFIX vllm serve $PROFILER_ARGS \
                    MODEL_PLACEHOLDER \
                    --disable-uvicorn-access-log \
                    --port $((8200 + R)) \
                    --tensor-parallel-size $TP_SIZE \
                    --enable-expert-parallel \
                    --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                    --data-parallel-rank $((START_RANK + R)) \
                    --data-parallel-size-local 1 \
                    --data-parallel-address ${LWS_LEADER_ADDRESS} \
                    --data-parallel-rpc-port 5555 \
                    --trust-remote-code \
                    ${KV_TRANSFER_CONFIG:+--kv_transfer_config "$KV_TRANSFER_CONFIG"} \
                    --gpu-memory-utilization 0.75 \
                    --max-num-batched-tokens $MAX_TOKENS \
                    --max-num-seqs $MAX_TOKENS \
                    --disable_cascade_attn \
                    --max-cudagraph-capture-size $MAX_TOKENS \
                    --moe-backend ${MOE_BACKEND} \
                    --all2all-backend "${A2A_BACKEND}" \
                    --async-scheduling \
                    --api-server-count 1 \
                    $EPLB_ARGS ${EPLB_JSON:-} \
                    $PREFIX_CACHE_ARG \
                    --kv-cache-dtype fp8 \
                    --enable-force-include-usage &
                done

                    #--all2all-backend "deepep_low_latency" \
                    ########
                    # TODO: try
                    #--speculative-config '{"method":"mtp","num_speculative_tokens":1}' \
                    #--compilation_config '{"cudagraph_mode": "FULL_AND_PIECEWISE"}' \
                    ########
                    
                    # --attention_backend "CUTLASS_MLA" \
                    #--profiler-config '{"profiler": "torch",
                    #                    "torch_profiler_dir": "/traces",
                    #                    "ignore_frontend": "true",
                    #                    "delay_iterations": 5,
                    #                    "max_iterations": 3}' \
                    #
                    #

                # If any process exits, kill all and restart pod
                wait -n
                kill $(jobs -p) 2>/dev/null
                exit 1

            env:
              - name: VLLM_USE_V2_MODEL_RUNNER
                value: "0"

              - name: VLLM_NO_USAGE_STATS
                value: "1"
              - name: TQDM_DISABLE
                value: "1"

              # Set to a Lustre venv path to override baked-in vLLM (e.g. LUSTRE_PREFIX_PLACEHOLDER/vllm-venv)
              - name: VLLM_DEV_VENV
                value: VLLM_DEV_VENV_PLACEHOLDER

              # DeepEP low-latency only: NVFP4 dispatch + masked_gemm
              #- name: VLLM_DEEPEPLL_NVFP4_DISPATCH
              #  value: "1"
              #- name: VLLM_FLASHINFER_MOE_BACKEND
              #  value: "masked_gemm"

              - name: MAX_TOKENS
                value: "1024"

              # Enable on-demand profiling via /start_profile and /stop_profile
              - name: VLLM_TORCH_PROFILER_DIR
                value: "/traces"

              # HuggingFace token and cache location
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/local/hf_cache

              # Compile caches - persist across restarts for faster startup
              - name: VLLM_CACHE_ROOT
                value: LUSTRE_PREFIX_PLACEHOLDER/vllm_cache_extdp
              - name: FLASHINFER_CACHE_DIR
                value: LUSTRE_PREFIX_PLACEHOLDER/flashinfer_cache_extdp

              # Tensor parallelism - GPUs per DP rank (DP_SIZE_LOCAL = 4 / TP_SIZE)
              - name: TP_SIZE
                value: "1"

              - name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
                value: "1"

              # Common vLLM settings
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: MOE_BACKEND
                value: auto
              - name: A2A_BACKEND
                value: deepep_low_latency
              - name: EPLB_COMMUNICATOR
                value: nixl
              - name: EPLB_ENABLED
                value: "DECODE_EPLB_ENABLED_PLACEHOLDER"
              - name: EPLB_USE_ASYNC
                value: "EPLB_USE_ASYNC_PLACEHOLDER"
              - name: EPLB_STEP_INTERVAL
                value: "EPLB_STEP_INTERVAL_PLACEHOLDER"
              - name: EPLB_NUM_REDUNDANT_EXPERTS
                value: "EPLB_NUM_REDUNDANT_EXPERTS_PLACEHOLDER"
              - name: EPLB_WINDOW_SIZE
                value: "EPLB_WINDOW_SIZE_PLACEHOLDER"
              - name: EPLB_LOG_BALANCEDNESS
                value: "EPLB_LOG_BALANCEDNESS_PLACEHOLDER"
              - name: EPLB_LOG_BALANCEDNESS_INTERVAL
                value: "EPLB_LOG_BALANCEDNESS_INTERVAL_PLACEHOLDER"
              - name: EPLB_EXPERT_LOAD_DUMP_DIR
                value: "EPLB_EXPERT_LOAD_DUMP_DIR_PLACEHOLDER"
              - name: PREFIX_CACHING
                value: "PREFIX_CACHING_PLACEHOLDER"
              # - name: VLLM_USE_FLASHINFER_MOE_FP8
              #   value: "1"
              - name: VLLM_COMPUTE_NANS_IN_LOGITS
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled

              - name: PYTORCH_CUDA_ALLOC_CONF
                value: "expandable_segments:False"


              # NVSHMEM config (DeepEP only, not needed for flashinfer_moe_a2a)
              - name: NVSHMEM_CUMEM_HANDLE_TYPE
                value: FABRIC
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"

              # UCX configuration for NIXL - use only working InfiniBand devices
              # Excluded: mlx5_2/5 are Ethernet/RoCE with no GID configured, mlx5_6 is DOWN
              - name: UCX_NET_DEVICES
                value: "mlx5_0:1,mlx5_1:1,mlx5_3:1,mlx5_4:1"
              - name: UCX_TLS
                value: "^cuda_ipc"

              # Engine startup timeout (default 600s, increase for large models over network storage)
              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"
              
              # Debug logging
              - name: VLLM_LOGGING_LEVEL
                value: INFO
              #- name: NCCL_DEBUG
              #  value: "TRACE"
              #- name: NVSHMEM_DEBUG
              #  value: INFO

              # KV_TRANSFER_CONFIG and VLLM_NIXL_SIDE_CHANNEL_HOST are
              # added by overlays (pd vs decode-bench use different connectors)
            ports:
              - containerPort: 8200
                name: vllm-rank0
                protocol: TCP
              - containerPort: 8201
                name: vllm-rank1
                protocol: TCP
              - containerPort: 8202
                name: vllm-rank2
                protocol: TCP
              - containerPort: 8203
                name: vllm-rank3
                protocol: TCP
            readinessProbe:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    for port in 8000 8001 8002 8003; do
                      curl -sf http://localhost:$port/v1/models | grep -q '"id"' || exit 1
                    done
              periodSeconds: 5
              failureThreshold: 60
            resources:
              claims:
                - name: compute-domain-channel
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/lustre
                name: lustre
              - mountPath: /mnt/local
                name: local-nvme
            workingDir: /code
