apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-decode
  labels:
    llm-d.ai/inferenceServing: "true"
    llm-d.ai/model: DeepSeek-V4-Pro
    llm-d.ai/role: decode
spec:
  replicas: 1
  rolloutStrategy:
    type: RollingUpdate
    rollingUpdateConfiguration:
      maxUnavailable: 100%
  leaderWorkerTemplate:
    size: 4
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/deploy-ts: DEPLOY_TS_PLACEHOLDER
          llm-d.ai/inferenceServing: "true"
          llm-d.ai/model: DeepSeek-V4-Pro
          llm-d.ai/owner: OWNER_PLACEHOLDER
          llm-d.ai/role: decode
      spec:
        serviceAccountName: wide-ep
        terminationGracePeriodSeconds: 0
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: lustre
            persistentVolumeClaim:
              claimName: lustre-pvc-vllm
          - name: local-nvme
            hostPath:
              path: /mnt/numa0
              type: Directory
          - name: sys
            hostPath:
              path: /sys
              type: Directory
          - name: proc
            hostPath:
              path: /proc
              type: Directory
          - name: dcgm-metrics
            configMap:
              name: wide-ep-dcgm-metrics
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: llm-d-dev-claim
        initContainers:
          - name: routing-proxy
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.8.0
            imagePullPolicy: Always
            args:
              - --port=8000
              - --vllm-port=8200
              - --data-parallel-size=4
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8000
                name: rank0
                protocol: TCP
              - containerPort: 8001
                name: rank1
                protocol: TCP
              - containerPort: 8002
                name: rank2
                protocol: TCP
              - containerPort: 8003
                name: rank3
                protocol: TCP
            restartPolicy: Always
            resources: 
              limits:
                cpu: 8
                memory: 16Gi
              requests:
                cpu: 8
                memory: 16Gi
            securityContext:
              allowPrivilegeEscalation: false
        containers:
          - name: vllm
            image: VLLM_IMAGE_PLACEHOLDER
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                set -euo pipefail
                # Persist logs to Lustre so they survive LWS pod recreation
                LOG_DIR=LUSTRE_PREFIX_PLACEHOLDER/logs/decode
                mkdir -p "$LOG_DIR"
                LOG_FILE="$LOG_DIR/${HOSTNAME}_$(date +%Y%m%d-%H%M%S).log"
                exec > >(tee -a "$LOG_FILE") 2>&1
                echo "=== Pod $HOSTNAME started at $(date -Iseconds) ==="

                FORK_REPO="FORK_REPO_PLACEHOLDER"
                FORK_BRANCH="FORK_BRANCH_PLACEHOLDER"
                if [ -n "$FORK_BRANCH" ] && [ -d /opt/vllm-source ]; then
                  cd /opt/vllm-source
                  git remote add fork "$FORK_REPO" 2>/dev/null || git remote set-url fork "$FORK_REPO"
                  git fetch fork "$FORK_BRANCH"
                  git checkout "fork/$FORK_BRANCH"
                  echo "=== Checked out fork/$FORK_BRANCH at $(date) ==="
                  cd -
                fi

                # DEV mode: use persistent Lustre venv; image venv if present; else system python
                if [ -n "${VLLM_DEV_VENV}" ] && [ -d "${VLLM_DEV_VENV}" ]; then
                  echo "Using dev venv at ${VLLM_DEV_VENV}"
                  source "${VLLM_DEV_VENV}/bin/activate"
                  export LD_LIBRARY_PATH="${VLLM_DEV_VENV}/lib/python3.12/site-packages/nvidia/nccl/lib:${LD_LIBRARY_PATH:-}"
                elif [ -f /opt/vllm/bin/activate ]; then
                  source /opt/vllm/bin/activate
                fi

                # Derive batch-size-dependent env vars from MAX_TOKENS
                export VLLM_MOE_DP_CHUNK_SIZE=$MAX_TOKENS
                # NVSHMEM_QP_DEPTH only needed for DeepEP
                export NVSHMEM_QP_DEPTH=$((MAX_TOKENS * 2 + 2))

                DP_SIZE_LOCAL=$((4 / TP_SIZE))
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                PROFILER_ARGS=""
                NSYS_BASE_ARGS=""
                NVTX_TRACING_ARG=""
                if [ "${ENABLE_PROFILING:-0}" = "1" ]; then
                  echo "Profiling enabled (type=${PROFILER_TYPE:-nsys})..."
                  TRACE_DIR="${NSYS_TRACE_DIR:-LUSTRE_PREFIX_PLACEHOLDER/traces/nsys}"
                  mkdir -p "$TRACE_DIR"
                  if [ "${PROFILER_TYPE:-nsys}" = "nsys" ]; then
                    uv pip install nvtx
                    if ! command -v nsys &>/dev/null; then
                      CUDA_MAJ=$(nvcc --version 2>/dev/null | grep -oP 'V\K[0-9]+' | head -1)
                      apt-get update -qq && apt-get install -y --no-install-recommends "cuda-nsight-systems-${CUDA_MAJ:-13}-0" || \
                      (echo "ERROR: Could not install nsys. Add nsight-systems to your container image." && exit 1)
                    fi
                    NSYS_BASE_ARGS="--capture-range=cudaProfilerApi --capture-range-end=stop --cuda-graph-trace=node --trace=cuda,nvtx"
                    PROFILER_ARGS="--profiler-config {\"profiler\":\"cuda\",\"delay_iterations\":${PROFILER_DELAY_ITERS:-5},\"max_iterations\":${PROFILER_MAX_ITERS:-3}}"
                    NVTX_TRACING_ARG="--enable-layerwise-nvtx-tracing"
                  else
                    PROFILER_ARGS="--profiler-config {\"profiler\":\"torch\",\"max_iterations\":${PROFILER_MAX_ITERS:-32},\"torch_profiler_dir\":\"/trace\"}"
                  fi
                fi

                for R in $(seq 0 $((DP_SIZE_LOCAL - 1))); do
                  GPU_START=$((R * TP_SIZE))
                  GPUS=$(seq -s, $GPU_START $((GPU_START + TP_SIZE - 1)))
                  RANK=$((START_RANK + R))

                  NSYS_PREFIX=""
                  if [ -n "$NSYS_BASE_ARGS" ]; then
                    NSYS_PREFIX="nsys profile --session-new=rank_${RANK} $NSYS_BASE_ARGS -o $TRACE_DIR/decode_rank_${RANK}"
                  fi

                  VLLM_CACHE_ROOT=${VLLM_CACHE_ROOT}/rank${RANK} \
                  FLASHINFER_CACHE_DIR=${FLASHINFER_CACHE_DIR}/rank${RANK} \
                  CUDA_VISIBLE_DEVICES=$GPUS $NSYS_PREFIX vllm serve $PROFILER_ARGS $NVTX_TRACING_ARG \
                    deepseek-ai/DeepSeek-V4-Pro \
                    --disable-uvicorn-access-log \
                    --port $((8200 + R)) \
                    --tensor-parallel-size $TP_SIZE \
                    --enable-expert-parallel \
                    --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                    --data-parallel-rank $((START_RANK + R)) \
                    --data-parallel-size-local 1 \
                    --data-parallel-address ${LWS_LEADER_ADDRESS} \
                    --data-parallel-rpc-port 5555 \
                    --trust-remote-code \
                    ${KV_TRANSFER_CONFIG:+--kv_transfer_config "$KV_TRANSFER_CONFIG"} \
                    --gpu-memory-utilization 0.85 \
                    --max-num-batched-tokens $MAX_TOKENS \
                    --max-num-seqs $MAX_TOKENS \
                    --max-cudagraph-capture-size $MAX_TOKENS \
                    --api-server-count 4 \
                    --kv-cache-dtype fp8 \
                    --block-size 256 \
                    --no-disable-hybrid-kv-cache-manager \
                    --attention_config.use_fp4_indexer_cache=True \
                    --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY","custom_ops":["all"]}' \
                    --enable-sleep-mode \
                    --enable-force-include-usage \
                    --all2all-backend "deepep_v2" &
                    #--profiler-config '{"profiler":"torch","torch_profiler_dir":"/traces","ignore_frontend":"true","max_iterations":3}'
                done
                    #--all2all-backend "deepep_v2" \
                    #--moe-backend flashinfer_trtllm \

                    
                    #--compilation-config '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}' \
                    #--all2all-backend "flashinfer_nvlink_one_sided" \
                    ########
                    # TODO: try
                    #--speculative-config '{"method":"mtp","num_speculative_tokens":1}' \
                    #--compilation_config '{"cudagraph_mode": "FULL_AND_PIECEWISE"}' \
                    ########
                    
                    # --attention_backend "CUTLASS_MLA" \
                    #--profiler-config '{"profiler": "torch",
                    #                    "torch_profiler_dir": "/traces",
                    #                    "ignore_frontend": "true",
                    #                    "delay_iterations": 5,
                    #                    "max_iterations": 3}' \
                    #
                    #

                # If any process exits, kill all and restart pod
                wait -n
                kill $(jobs -p) 2>/dev/null
                exit 1

            env:
              #- name: VLLM_USE_V2_MODEL_RUNNER
              #  value: "1"

              - name: VLLM_HTTP_TIMEOUT_KEEP_ALIVE
                value: "120"

              - name: ACTIVATION_V2_GRID_Y
                value: "512"
              - name: VLLM_NO_USAGE_STATS
                value: "1"
              - name: TQDM_DISABLE
                value: "1"


              # Set to a Lustre venv path to override baked-in vLLM (e.g. LUSTRE_PREFIX_PLACEHOLDER/vllm-venv)
              - name: VLLM_DEV_VENV
                value: VLLM_DEV_VENV_PLACEHOLDER

              - name: VLLM_DEEPEPLL_NVFP4_DISPATCH
                value: "1"
              - name: VLLM_FLASHINFER_MOE_BACKEND
                value: "masked_gemm"
              - name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
                value: "1"
              - name: VLLM_ENABLE_MOE_DP_CHUNK
                value: "0"

              - name: MAX_TOKENS
                value: "1024"

              - name: ENABLE_PROFILING
                value: "1"
              - name: PROFILER_TYPE
                value: "nsys"
              - name: PROFILER_DELAY_ITERS
                value: "5"
              - name: PROFILER_MAX_ITERS
                value: "3"

              #- name: VLLM_TORCH_PROFILER_DIR
              #  value: "/traces"

              # HuggingFace token and cache location
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/local/hf_cache

              # Compile caches - persist across restarts for faster startup
              - name: VLLM_CACHE_ROOT
                value: LUSTRE_PREFIX_PLACEHOLDER/vllm_cache_extdp
              - name: FLASHINFER_CACHE_DIR
                value: LUSTRE_PREFIX_PLACEHOLDER/flashinfer_cache_extdp

              # Flash Attention cute DSL JIT - persist compiled kernels to Lustre
              - name: FLASH_ATTENTION_CUTE_DSL_CACHE_ENABLED
                value: "1"
              - name: FLASH_ATTENTION_CUTE_DSL_CACHE_DIR
                value: LUSTRE_PREFIX_PLACEHOLDER/fa_cute_dsl_cache

              # Tensor parallelism - GPUs per DP rank (DP_SIZE_LOCAL = 4 / TP_SIZE)
              - name: TP_SIZE
                value: "1"

              - name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
                value: "1"

              # DeepEP LL sgl fork allocates two buffers, only one of which is required for MNNVL.
              # Wasted 1Gb per rank by default, otherwise.
              - name: VLLM_DEEPEP_BUFFER_SIZE_MB
                value: "0"

              # Common vLLM settings
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled

              # NCCL symmetric memory (required for DeepSeek-V4)
              - name: VLLM_USE_NCCL_SYMM_MEM
                value: "1"
              - name: NCCL_CUMEM_ENABLE
                value: "1"
              - name: NCCL_MNNVL_ENABLE
                value: "1"
              - name: NCCL_NVLS_ENABLE
                value: "1"

              # NVSHMEM config (DeepEP only, not needed for flashinfer_moe_a2a)
              - name: NVSHMEM_CUMEM_HANDLE_TYPE
                value: FABRIC
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"

              # UCX configuration for NIXL - use only working InfiniBand devices
              # Excluded: mlx5_2/5 are Ethernet/RoCE with no GID configured, mlx5_6 is DOWN
              - name: UCX_NET_DEVICES
                value: "mlx5_0:1,mlx5_1:1,mlx5_3:1,mlx5_4:1"

              # Engine startup timeout (default 600s, increase for large models over network storage)
              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"

              # Debug logging
              - name: VLLM_LOGGING_LEVEL
                value: INFO
              #- name: NCCL_DEBUG
              #  value: "TRACE"
              #- name: NVSHMEM_DEBUG
              #  value: INFO

              # KV_TRANSFER_CONFIG and VLLM_NIXL_SIDE_CHANNEL_HOST are
              # added by overlays (pd vs decode-bench use different connectors)
            ports:
              - containerPort: 8200
                name: vllm-rank0
                protocol: TCP
              - containerPort: 8201
                name: vllm-rank1
                protocol: TCP
              - containerPort: 8202
                name: vllm-rank2
                protocol: TCP
              - containerPort: 8203
                name: vllm-rank3
                protocol: TCP
            readinessProbe:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    for port in 8000 8001 8002 8003; do
                      curl -sf http://localhost:$port/v1/models | grep -q '"id"' || exit 1
                    done
              periodSeconds: 5
              failureThreshold: 60
            resources:
              claims:
                - name: compute-domain-channel
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/lustre
                name: lustre
              - mountPath: /mnt/local
                name: local-nvme
            workingDir: /code
          - name: dcgm-exporter
            image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
            imagePullPolicy: IfNotPresent
            args: ["-f", "/etc/dcgm-exporter/custom-counters.csv"]
            ports:
              - containerPort: 9400
                name: dcgm
                protocol: TCP
            env:
              - name: NVIDIA_VISIBLE_DEVICES
                value: "all"
              - name: NVIDIA_DRIVER_CAPABILITIES
                value: "utility"
              - name: DCGM_EXPORTER_KUBERNETES_GPU_ID_TYPE
                value: "uid"
            volumeMounts:
              - name: dcgm-metrics
                mountPath: /etc/dcgm-exporter/custom-counters.csv
                subPath: custom-counters.csv
                readOnly: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
          - name: node-exporter
            image: quay.io/prometheus/node-exporter:v1.9.0
            imagePullPolicy: IfNotPresent
            args:
              - --collector.disable-defaults
              - --collector.infiniband
              - --collector.netstat
              - --collector.netstat.fields=(.*Retrans.*|.*Timeout.*|.*LossProbe.*|.*FastRetrans.*|.*SackRecovery.*|.*Estab.*|.*Segs.*|.*Drops.*|.*Overflow.*|.*MemoryPressure.*)
              - --collector.pressure
              - --collector.schedstat
              - --collector.cpu
              - --path.sysfs=/host/sys
              - --path.procfs=/host/proc
            ports:
              - containerPort: 9100
                name: node-metrics
                protocol: TCP
            volumeMounts:
              - name: sys
                mountPath: /host/sys
                readOnly: true
              - name: proc
                mountPath: /host/proc
                readOnly: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
