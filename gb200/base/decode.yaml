apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-decode
  labels:
    llm-d.ai/inferenceServing: "true"
    llm-d.ai/model: DeepSeek-R1-0528-FP4-v2
    llm-d.ai/role: decode
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 8
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/inferenceServing: "true"
          llm-d.ai/model: DeepSeek-R1-0528-FP4-v2
          llm-d.ai/role: decode
      spec:
        serviceAccountName: wide-ep
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: lustre
            persistentVolumeClaim:
              claimName: lustre-pvc-vllm
          - name: jit-build-scripts
            configMap:
              name: jit-build-scripts
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: llm-d-dev-claim
        initContainers:
          - name: routing-proxy-rank0
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            args:
              - --port=8000
              - --vllm-port=8200
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8000
                name: proxy-rank0
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank1
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            args:
              - --port=8001
              - --vllm-port=8201
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8001
                name: proxy-rank1
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank2
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            args:
              - --port=8002
              - --vllm-port=8202
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8002
                name: proxy-rank2
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
          - name: routing-proxy-rank3
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            args:
              - --port=8003
              - --vllm-port=8203
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8003
                name: proxy-rank3
                protocol: TCP
            restartPolicy: Always
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
        containers:
          - name: vllm
            image: quay.io/rh-ee-ecrncevi/llm-dev-cuda13:v0.5.0-arm64-upstream-941e52c29813ed75b3382f2a0d74ad5f168fc046
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                set -e
                #################
                # RUN vLLM decode-bench with external DP load balancing
                # Launches 4 independent vLLM processes (one per GPU)
                # Routing sidecar maps port 800X -> localhost:820X
                #################
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                # Forward logs to Lustre for crash debugging
                LOG_DIR="/mnt/lustre/vllm-vlm-elvircrn/logs/decode-bench"
                mkdir -p $LOG_DIR
                LOG_FILE="$LOG_DIR/${HOSTNAME}_$(date +%Y%m%d_%H%M%S).log"
                exec > >(tee -a "$LOG_FILE") 2>&1
                echo "=== Decode-bench worker starting at $(date) ==="
                source /opt/vllm/bin/activate
                uv pip uninstall pplx-kernels

                # Cherry-pick NVFP4 EPLB contiguity fix
                cd /opt/vllm-source
                git remote add elvircrn https://github.com/elvircrn/vllm.git
                git fetch elvircrn fix-eplb-nvfp4-contiguous
                git fetch elvircrn mla-fused-concat-quant
                git fetch elvircrn gb200_fused_op
                git fetch elvircrn gb200_working_fused_rope
                git fetch elvircrn gb200_working
                git fetch elvircrn gemm2-combine-overlap
                git remote add centml https://github.com/CentML/vllm.git
                git fetch centml wzhao/moe-a2a
                
                # Disabled for now
                # git fetch elvircrn eplb-fix-outdated
                # git cherry-pick --no-commit 00a944ef8e
                # git cherry-pick --no-commit a0b972fd1
                
                # Q_b proj PR
                # Needs rebase
                # git cherry-pick --no-commit 24ae04cb7a
                
                # GEMM2-combine two-stream overlap (single squashed commit)
                # git cherry-pick --no-commit 7cb5e86cba

                # Yank ropequant from FlashInfer into vLLM tree
                # git cherry-pick --no-commit e68d131b39d9b46cc402dda1f35009f55e924b1d
                # git cherry-pick --no-commit 782ef44e4a1512297f05314eb85f18c1573307f2
                # git cherry-pick --no-commit 8af5bb313d8efed3d1fc0ff501ea723813313470
                # # Fused RoPE+FP8 quant + KV cache scatter-write (split 2K)
                # git cherry-pick --no-commit 13b2949ac4
                # # Dual-stream: aux_stream() singleton for cudagraph compat
                # git cherry-pick --no-commit b16ecc1647
                
                
                
                
                
                # BF16×BF16→FP8 CUTLASS absorption BMM (strided TMA, rope+nope overlap)
                # git cherry-pick --no-commit f21c694a27
                
                
                
                
                # FlashInfer MoE A2A kernel (PR #36022)
                git cherry-pick --no-commit 1897f159f2
                git cherry-pick --no-commit 3e26d15acb
                git cherry-pick --no-commit 6ebc00ea5d
                git cherry-pick --no-commit 2661092a11
                git cherry-pick --no-commit b74eaa332c
                git cherry-pick --no-commit 8c11d32152
                git cherry-pick --no-commit eec985e8f3
                git cherry-pick --no-commit 7506131783
                # Fix int64 -> int32 dtype mismatch for tokenSelectedExperts
                sed -i 's/token_selected_experts=topk_ids,/token_selected_experts=topk_ids.to(torch.int32),/' \
                  vllm/model_executor/layers/fused_moe/prepare_finalize/flashinfer_moe_a2a.py


                # echo "=== JIT-compiling mla_rope_quant at $(date) ==="
                # python tools/jit_mla_rope_quant.py
                # sed -i '1s/^/import mla_rope_quant_ext\n/' vllm/_custom_ops.py
                # sed -i 's/torch\.ops\._C\.mla_rope_quantize_fp8/mla_rope_quant_ext.mla_rope_quantize_fp8/g' vllm/_custom_ops.py
                # sed -i 's/torch\.ops\._C\.mla_fused_cache_/mla_rope_quant_ext.mla_fused_cache_/g' vllm/_custom_ops.py
                # export PYTHONPATH=/tmp/jit_build/mla_rope_quant:${PYTHONPATH:-}
                # echo "=== JIT rope_quant build complete at $(date) ==="

                # echo "=== JIT-compiling mla_absorption_bmm at $(date) ==="
                # python tools/jit_mla_absorption_bmm.py
                # sed -i '1s/^/import mla_absorption_bmm_ext\n/' vllm/_custom_ops.py
                # sed -i 's/torch\.ops\._C\.mla_absorption_bmm_bf16/mla_absorption_bmm_ext.mla_absorption_bmm_bf16/g' vllm/_custom_ops.py
                # export PYTHONPATH=/tmp/jit_build/mla_absorption_bmm:${PYTHONPATH:-}
                # echo "=== JIT absorption_bmm build complete at $(date) ==="

                # Derive batch-size-dependent env vars from MAX_TOKENS
                export VLLM_MOE_DP_CHUNK_SIZE=$MAX_TOKENS
                export NVSHMEM_QP_DEPTH=$((MAX_TOKENS * 2))  # should be >= 2 * VLLM_MOE_DP_CHUNK_SIZE

                DP_SIZE_LOCAL=$((4 / TP_SIZE))
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                for R in $(seq 0 $((DP_SIZE_LOCAL - 1))); do
                  VLLM_CACHE_ROOT=${VLLM_CACHE_ROOT}/rank$R \
                  FLASHINFER_CACHE_DIR=${FLASHINFER_CACHE_DIR}/rank$R \
                  CUDA_VISIBLE_DEVICES=$R $NSYS_PREFIX vllm serve $PROFILER_ARGS \
                    nvidia/DeepSeek-R1-0528-FP4-v2 \
                    --host :: \
                    --port $((8200 + R)) \
                    --disable-uvicorn-access-log \
                    --enable-expert-parallel \
                    --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                    --data-parallel-rank $((START_RANK + R)) \
                    --data-parallel-size-local 1 \
                    --data-parallel-address ${LWS_LEADER_ADDRESS} \
                    --data-parallel-rpc-port 5555 \
                    --trust-remote-code \
                    --gpu-memory-utilization 0.75 \
                    --kv-cache-dtype fp8 \
                    --kv_transfer_config "$KV_TRANSFER_CONFIG" \
                    --async-scheduling \
                    --max-cudagraph-capture-size 8192 \
                    --max-num-batched-tokens 8192 \
                    --all2all-backend "flashinfer_moe_a2a" \
                    --compilation_config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
                    --enable-force-include-usage &
                done
                

                # If any process exits, kill all and restart pod
                wait -n
                kill $(jobs -p) 2>/dev/null
                exit 1

            env:
              # Set to a Lustre venv path to override baked-in vLLM (e.g. /mnt/lustre/tms/vllm-venv)
              - name: VLLM_DEV_VENV
                value: ""

              # Use NVFP4 dispatch, and then masked_gemm is required to avoid crashes
              - name: VLLM_DEEPEPLL_NVFP4_DISPATCH
                value: "1"
              - name: VLLM_FLASHINFER_MOE_BACKEND
                value: "masked_gemm"

              - name: MAX_TOKENS
                value: "1024"

              # Enable on-demand profiling via /start_profile and /stop_profile
              - name: VLLM_TORCH_PROFILER_DIR
                value: "/traces"

              # JIT build parallelism
              - name: MAX_JOBS
                value: "64"
              - name: CMAKE_BUILD_PARALLEL_LEVEL
                value: "64"
              - name: MAKEFLAGS
                value: "-j64"
              - name: NVCC_THREADS
                value: "64"
              - name: CUDA_HOME
                value: "/usr/local/cuda-13"

              # HuggingFace token and cache location
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/lustre/vllm-vlm-elvircrn
              - name: TRANSFORMERS_CACHE
                value: /mnt/lustre/vllm-vlm-elvircrn
              - name: HF_HUB_CACHE
                value: /mnt/lustre/vllm-vlm-elvircrn

              # Compile caches - persist across restarts for faster startup
              - name: VLLM_CACHE_ROOT
                value: /mnt/lustre/vllm-vlm-elvircrn/vllm_cache
              - name: FLASHINFER_CACHE_DIR
                value: /mnt/lustre/vllm-vlm-elvircrn/flashinfer_cache

              # Tensor parallelism - GPUs per DP rank (DP_SIZE_LOCAL = 4 / TP_SIZE)
              - name: TP_SIZE
                value: "1"

              - name: DP_SIZE_LOCAL
                value: "4"

              - name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
                value: "1"

              - name: VLLM_MLA_FUSED_ROPE_CACHE
                value: "1"

              - name: VLLM_MLA_FUSED_ABSORPTION
                value: "1"

              - name: VLLM_DEEPEP_COMBINE_GEMM2_OVERLAP
                value: "1"

              - name: VLLM_DEEPEP_COMBINE_COMM_SMS
                value: "32"

              # Common vLLM settings
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled

              # Use fabric handles for NVSHMEM symmetric heap (MNNVL)
              # Without this, NVSHMEM defaults to FILE_DESCRIPTOR (IPC handles)
              # and falls back to ibrc transport instead of NVLink fabric
              - name: NVSHMEM_CUMEM_HANDLE_TYPE
                value: FABRIC

              # Override container default that disables VMM
              # VMM is required for fabric memory / MNNVL cross-pod communication
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"

              # UCX configuration for NIXL - use only working InfiniBand devices
              # Excluded: mlx5_2/5 are Ethernet/RoCE with no GID configured, mlx5_6 is DOWN
              - name: UCX_NET_DEVICES
                value: "mlx5_0:1,mlx5_1:1"

              # Engine startup timeout (default 600s, increase for large models over network storage)
              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"

              # Debug logging
              - name: VLLM_LOGGING_LEVEL
                value: INFO
              #- name: NCCL_DEBUG
              #  value: "TRACE"
              #- name: NVSHMEM_DEBUG
              #  value: INFO

              # KV_TRANSFER_CONFIG and VLLM_NIXL_SIDE_CHANNEL_HOST are
              # added by overlays (pd vs decode-bench use different connectors)
            ports:
              - containerPort: 8200
                name: vllm-rank0
                protocol: TCP
              - containerPort: 8201
                name: vllm-rank1
                protocol: TCP
              - containerPort: 8202
                name: vllm-rank2
                protocol: TCP
              - containerPort: 8203
                name: vllm-rank3
                protocol: TCP
            readinessProbe:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 60
              periodSeconds: 10
            resources:
              claims:
                - name: compute-domain-channel
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/lustre/vllm-vlm-elvircrn
                name: lustre
              # - name: jit-build-scripts
              #   mountPath: /opt/vllm-source/tools/jit_mla_rope_quant.py
              #   subPath: jit_mla_rope_quant.py
              #   readOnly: true
              # - name: jit-build-scripts
              #   mountPath: /opt/vllm-source/tools/jit_mla_absorption_bmm.py
              #   subPath: jit_mla_absorption_bmm.py
              #   readOnly: true
            workingDir: /code
