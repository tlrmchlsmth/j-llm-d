apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-prefill
  labels:
    llm-d.ai/inferenceServing: "true"
    llm-d.ai/model: DeepSeek-R1-0528-FP4-v2
    llm-d.ai/role: prefill
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/inferenceServing: "true"
          llm-d.ai/model: DeepSeek-R1-0528-FP4-v2
          llm-d.ai/role: prefill
      spec:
        serviceAccountName: wide-ep
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: lustre
            persistentVolumeClaim:
              claimName: lustre-pvc-vllm
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: llm-d-dev-claim
        containers:
          - name: vllm
            image: quay.io/tms/llm-d-cuda-dev:gb200_working-6a3214a31
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                #################
                # RUN vLLM prefill with external DP load balancing
                # TP_SIZE controls tensor parallelism (GPUs per DP rank)
                # DP_SIZE_LOCAL is derived: 4 GPUs / TP_SIZE
                # No routing sidecar - serves directly on ports 8000+
                #################
                # DEV mode: use persistent Lustre venv; otherwise use baked-in image venv
                if [ -n "${VLLM_DEV_VENV}" ] && [ -d "${VLLM_DEV_VENV}" ]; then
                  echo "Using dev venv at ${VLLM_DEV_VENV}"
                  source "${VLLM_DEV_VENV}/bin/activate"
                else
                  source /opt/vllm/bin/activate
                fi

                uv pip uninstall pplx-kernels

                DP_SIZE_LOCAL=$((4 / TP_SIZE))
                DP_SIZE=$((LWS_GROUP_SIZE * DP_SIZE_LOCAL))
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                # Build DP flags only when there are multiple DP ranks
                DP_FLAGS=""
                if [ $DP_SIZE -gt 1 ]; then
                  DP_FLAGS="--data-parallel-size $DP_SIZE \
                    --data-parallel-size-local 1 \
                    --data-parallel-address ${LWS_LEADER_ADDRESS} \
                    --data-parallel-rpc-port 5555"
                fi

                for R in $(seq 0 $((DP_SIZE_LOCAL - 1))); do
                  GPU_START=$((R * TP_SIZE))
                  GPUS=$(seq -s, $GPU_START $((GPU_START + TP_SIZE - 1)))

                  RANK_FLAGS=""
                  if [ $DP_SIZE -gt 1 ]; then
                    RANK_FLAGS="--data-parallel-rank $((START_RANK + R))"
                  fi

                  VLLM_CACHE_ROOT=${VLLM_CACHE_ROOT}/rank$R \
                  FLASHINFER_CACHE_DIR=${FLASHINFER_CACHE_DIR}/rank$R \
                  CUDA_VISIBLE_DEVICES=$GPUS vllm serve \
                    nvidia/DeepSeek-R1-0528-FP4-v2 \
                    --port $((8000 + R)) \
                    --tensor-parallel-size $TP_SIZE \
                    --disable-uvicorn-access-log \
                    --enable-expert-parallel \
                    $DP_FLAGS $RANK_FLAGS \
                    --trust-remote-code \
                    --kv_transfer_config "$KV_TRANSFER_CONFIG" \
                    --async-scheduling \
                    --gpu-memory-utilization 0.75 \
                    --kv-cache-dtype fp8 \
                    --enforce-eager \
                    --max-cudagraph-capture-size 8192 \
                    --max-num-batched-tokens 8192 \
                    --all2all-backend allgather_reducescatter \
                    --enable-force-include-usage &
                done

                    #--profiler-config '{"profiler": "torch",
                    #                    "torch_profiler_dir": "/traces",
                    #                    "ignore_frontend": "true",
                    #                    "delay_iterations": 5,
                    #                    "max_iterations": 3}' \

                # If any process exits, kill all and restart pod
                wait -n
                kill $(jobs -p) 2>/dev/null
                exit 1

            env:
              # Set to a Lustre venv path to override baked-in vLLM (e.g. /mnt/lustre/tms/vllm-venv)
              - name: VLLM_DEV_VENV
                value: ""

              # Enable on-demand profiling via /start_profile and /stop_profile
              - name: VLLM_TORCH_PROFILER_DIR
                value: "/traces"

              # HuggingFace token and cache location
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/lustre/vllm-vlm-elvircrn
              - name: TRANSFORMERS_CACHE
                value: /mnt/lustre/vllm-vlm-elvircrn
              - name: HF_HUB_CACHE
                value: /mnt/lustre/vllm-vlm-elvircrn

              # Compile caches - persist across restarts for faster startup
              - name: VLLM_CACHE_ROOT
                value: /mnt/lustre/vllm-vlm-elvircrn/vllm_cache
              - name: FLASHINFER_CACHE_DIR
                value: /mnt/lustre/vllm-vlm-elvircrn/flashinfer_cache

              # Tensor parallelism - GPUs per DP rank (DP_SIZE_LOCAL = 4 / TP_SIZE)
              - name: TP_SIZE
                value: "1"
              - name: MAX_TOKENS
                value: "1024"

              # Common vLLM settings
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled

              # Override container default that disables VMM
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"

              # UCX configuration for NIXL - use only working InfiniBand devices
              # Excluded: mlx5_2/5 are Ethernet/RoCE with no GID configured, mlx5_6 is DOWN
              - name: UCX_NET_DEVICES
              #  value: "mlx5_0:1,mlx5_1:1,mlx5_3:1,mlx5_4:1"
              # Some ports are down on a couple of nodes.
                value: "mlx5_0:1,mlx5_1:1"

              # Engine startup timeout (default 600s, increase for large models over network storage)
              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"

              - name: VLLM_FLASHINFER_MOE_BACKEND
                value: "masked_gemm"

              # Debug logging
              - name: VLLM_LOGGING_LEVEL
                value: INFO
              #- name: NCCL_DEBUG
              #  value: "TRACE"
              #- name: NVSHMEM_DEBUG
              #  value: INFO

              # KV_TRANSFER_CONFIG and VLLM_NIXL_SIDE_CHANNEL_HOST are
              # added by overlays (pd vs decode-bench use different connectors)
            ports:
              - containerPort: 8000
                name: vllm-rank0
                protocol: TCP
              - containerPort: 8001
                name: vllm-rank1
                protocol: TCP
              - containerPort: 8002
                name: vllm-rank2
                protocol: TCP
              - containerPort: 8003
                name: vllm-rank3
                protocol: TCP
            readinessProbe:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 60
              periodSeconds: 10
            resources:
              claims:
                - name: compute-domain-channel
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/lustre
                name: lustre
            workingDir: /code
