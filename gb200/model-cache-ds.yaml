apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-cache
spec:
  selector:
    matchLabels:
      app: model-cache
  template:
    metadata:
      labels:
        app: model-cache
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      initContainers:
        - name: download
          image: VLLM_IMAGE_PLACEHOLDER
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command: ["/bin/sh", "-c"]
          args:
            - hf download MODEL_PLACEHOLDER
          env:
            - name: HF_HOME
              value: /mnt/local/hf_cache
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: HF_TOKEN
                  optional: true
          volumeMounts:
            - mountPath: /mnt/local
              name: local-nvme
          resources:
            requests:
              cpu: 2
              memory: 16Gi
            limits:
              cpu: 2
              memory: 16Gi
      containers:
        - name: idle
          image: VLLM_IMAGE_PLACEHOLDER
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              cpu: 1m
              memory: 16Mi
      volumes:
        - name: local-nvme
          hostPath:
            path: /mnt/numa0
            type: Directory
