multinode: false

modelArtifacts:
  # uri and name are set via MODEL env var in Justfile -> helmfile
  size: 150Gi
  authSecretName: "hf-secret"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "glm-agg"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "amd"

routing:
  proxy:
    enabled: false
    targetPort: 8000

accelerator:
  type: amd

decode:
  create: true
  parallelism:
    tensor: 8
    data: 1
  replicas: 1
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: ghcr.io/vcave/llm-d/llm-d-rocm:v0.4.6-debug
      securityContext:
        privileged: true
      modelCommand: custom
      command: ["/bin/bash", "-c"]
      args:
        - |
          # GPU partition coin flip for privileged pods sharing a node
          TOTAL_GPUS=$(python3 -c "import torch; print(torch.cuda.device_count())")
          TP=${TP_SIZE:-8}
          if [ "$TP" -lt "$TOTAL_GPUS" ]; then
            PARTS=$((TOTAL_GPUS / TP))
            SLOT=$((RANDOM % PARTS))
            START=$((SLOT * TP))
            END=$((START + TP - 1))
            DEVS=$(seq $START $END | paste -sd,)
            export ROCR_VISIBLE_DEVICES=$DEVS
            export HIP_VISIBLE_DEVICES=$DEVS
            echo "GPU PARTITION: slot $((SLOT+1))/$PARTS devices=$DEVS (TP=$TP, total=$TOTAL_GPUS)"
          else
            echo "GPU PARTITION: using all $TOTAL_GPUS GPUs (TP=$TP)"
          fi
          exec vllm serve "$VLLM_MODEL" \
            --port 8000 \
            --tensor-parallel-size "$TP_SIZE" \
            --served-model-name "$VLLM_MODEL" \
            --disable-uvicorn-access-log \
            --gpu-memory-utilization 0.95
      env:
        - name: VLLM_MODEL
          value: "RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic"
#        - name: VLLM_ROCM_USE_AITER
#          value: "1"
        - name: HF_HOME
          value: "/model-cache"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
              optional: true
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      resources:
        limits:
          # amd.com/gpu: 8  # added automatically from parallelism + accelerator
          memory: 200Gi
          cpu: "32"
        requests:
          # amd.com/gpu: 8  # added automatically from parallelism + accelerator
          memory: 200Gi
          cpu: "32"
      mountModelVolume: false
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: hf-cache
          mountPath: /model-cache
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "20Gi"
    - name: torch-compile-cache
      emptyDir: {}
    - name: hf-cache
      hostPath:
        path: /mnt/nvme/models
        type: DirectoryOrCreate

prefill:
  create: false
