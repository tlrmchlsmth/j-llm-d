multinode: false

modelArtifacts:
  # uri and name are set via MODEL env var in Justfile -> helmfile
  size: 150Gi
  authSecretName: "hf-secret"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "glm-disagg"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "amd"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
    connector: nixlv2
    secure: false

accelerator:
  type: amd

decode:
  parallelism:
    tensor: 8
  create: true
  replicas: 1
  extraConfig:
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: ghcr.io/vcave/llm-d/llm-d-rocm:v0.4.6-debug
      securityContext:
        privileged: true
      modelCommand: custom
      command: ["/bin/bash", "-c"]
      args:
        - |
          # GPU partition coin flip for privileged pods sharing a node
          TOTAL_GPUS=$(python3 -c "import torch; print(torch.cuda.device_count())")
          TP=${TP_SIZE:-8}
          if [ "$TP" -lt "$TOTAL_GPUS" ]; then
            PARTS=$((TOTAL_GPUS / TP))
            SLOT=$((RANDOM % PARTS))
            START=$((SLOT * TP))
            END=$((START + TP - 1))
            DEVS=$(seq $START $END | paste -sd,)
            export ROCR_VISIBLE_DEVICES=$DEVS
            export HIP_VISIBLE_DEVICES=$DEVS
            echo "GPU PARTITION: slot $((SLOT+1))/$PARTS devices=$DEVS (TP=$TP, total=$TOTAL_GPUS)"
          else
            echo "GPU PARTITION: using all $TOTAL_GPUS GPUs (TP=$TP)"
          fi
          exec vllm serve "$VLLM_MODEL" \
            --port 8200 \
            --tensor-parallel-size "$TP_SIZE" \
            --served-model-name "$VLLM_MODEL" \
            --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}' \
            --disable-uvicorn-access-log \
            --gpu-memory-utilization 0.95 \
            --block-size 128
      env:
        - name: VLLM_MODEL
          value: "RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic"
        - name: UCX_TLS
          value: "self,sm,rocm,rc"
        - name: UCX_NET_DEVICES
          value: "mlx5_0:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_7:1,mlx5_8:1,mlx5_9:1"
        - name: UCX_IB_GID_INDEX
          value: "3"
        - name: UCX_IB_TRAFFIC_CLASS
          value: "41"
        - name: UCX_MAX_RMA_RAILS
          value: "1"
#        - name: VLLM_ROCM_USE_AITER
#          value: "1"
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HF_HOME
          value: "/model-cache"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
              optional: true
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
        - containerPort: 5600
          name: nixl
          protocol: TCP
      resources:
        limits:
          memory: 400Gi
          cpu: "32"
        requests:
          memory: 400Gi
          cpu: "32"
      mountModelVolume: false
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: hf-cache
          mountPath: /model-cache
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "20Gi"
    - name: torch-compile-cache
      emptyDir: {}
    - name: hf-cache
      hostPath:
        path: /mnt/nvme/models
        type: DirectoryOrCreate

