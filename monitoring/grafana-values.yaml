persistence:
  enabled: false

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

adminPassword: admin

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    searchNamespace: ${NAMESPACE}

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.${NAMESPACE}.svc.cluster.local
        access: proxy
        isDefault: true
