apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # Remove decode LWS (aggregated uses prefill — no routing sidecar, serves on port 8000)
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-decode
    patch: |
      $patch: delete
      apiVersion: leaderworkerset.x-k8s.io/v1
      kind: LeaderWorkerSet
      metadata:
        name: wide-ep-decode

  # Patch prefill for aggregated mode
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-prefill
    patch: |-
      - op: add
        path: /metadata/labels/llm-d.ai~1deployment
        value: agg
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/metadata/labels/llm-d.ai~1deployment
        value: agg
