apiVersion: batch/v1
kind: Job
metadata:
  name: parallel-guidellm
  labels:
    app: guide-llm
spec:
  parallelism: ${N_WORKERS}
  completions: ${N_WORKERS}
  completionMode: Indexed
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: poker
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values: ["arm64", "amd64"]
      # Expand ephemeral port range (default 32768-60999 = ~28K ports) to ~64K
      # and enable reuse of TIME_WAIT ports for outbound connections.
      # Needed when running many workers with high concurrency against the
      # same gateway — each connection holds an ephemeral port, and closed
      # connections sit in TIME_WAIT for 60s.
      initContainers:
        - name: sysctl
          image: quay.io/tms/poker:0.0.15
          command: ["sh", "-c"]
          args:
            - |
              sysctl -w net.ipv4.ip_local_port_range='1024 65535'
              sysctl -w net.ipv4.tcp_tw_reuse=1
          securityContext:
            privileged: true
      containers:
        - name: poker
          image: quay.io/tms/poker:0.0.15
          imagePullPolicy: Always
          resources:
            limits:
              cpu: "4"
              memory: "24Gi"

          command: ["/bin/bash","-c"]
          args:
            - |
              exec guidellm benchmark \
                --target "http://${DEPLOY_NAME}-inference-gateway-istio.${NAMESPACE}.svc.cluster.local" \
                --rate-type concurrent \
                --rate "${MAX_CONCURRENCY}" \
                --max-requests "${NUM_REQUESTS}" \
                --rampup 30 \
                --backend-kwargs '{"timeout": 900}' \
                --data '{"prompt_tokens": ${INPUT_LEN}, "output_tokens": ${OUTPUT_LEN}}' \
                --output-path "/tmp/guidellm-${JOB_COMPLETION_INDEX}.json" \
                --output-sampling 500 \
                --disable-progress

          env:
            - name: GUIDELLM__MAX_CONCURRENCY
              value: "${MAX_CONCURRENCY}"
            - name: GUIDELLM__REQUEST_TIMEOUT
              value: "900"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: HF_TOKEN
                  optional: true

